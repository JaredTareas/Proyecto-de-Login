<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/login.css">
</head>

<body class="system-body">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
        <button class="btn btn-outline-light me-3" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebar" aria-controls="sidebar">
            ☰
        </button>
        
        <a class="navbar-brand" href="#">Sistema Web</a>

        <div class="ms-auto dropdown">
            <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                <span id="nombreUsuario">Usuario</span>
            </button>

            <ul class="dropdown-menu dropdown-menu-end">
                <li>
                    <button class="dropdown-item" id="btnSalir">
                        Salir del sistema
                    </button>
                </li>
            </ul>
        </div>
    </nav>
    <div class="offcanvas offcanvas-start bg-dark text-white" tabindex="-1" id="sidebar" aria-labelledby="sidebarLabel">
        <div class="offcanvas-header border-bottom border-secondary">
            <h5 class="offcanvas-title" id="sidebarLabel">Menú Principal</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Cerrar"></button>
        </div>
        <div class="offcanvas-body p-0">
            <div class="accordion accordion-flush" id="menuSidebar">
                
                <div class="accordion-item bg-dark border-0">
                    <h2 class="accordion-header">
                        <button class="accordion-button collapsed bg-dark text-white border-0 shadow-none text-start" type="button" data-bs-toggle="collapse" data-bs-target="#collapseUsuarios" aria-expanded="false" aria-controls="collapseUsuarios">
                            👤 Usuarios
                        </button>
                    </h2>
                    <div id="collapseUsuarios" class="accordion-collapse collapse" data-bs-parent="#menuSidebar">
                        <div class="accordion-body bg-secondary bg-opacity-25 p-0">
                            <ul class="nav flex-column">
                                <li class="nav-item">
                                    <a class="nav-link text-white-50 ps-4 py-2" href="#" id="btnCaptura">
                                        📝 Captura
                                    </a>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </div>
    <main class="container mt-5">
        <div class="card shadow">
            <div class="card-body">
                <h1>Bienvenido al sistema</h1>
                <p>
                    Si estás viendo esta pantalla, significa que el login funcionó correctamente.
                </p>

                <div class="alert alert-success">
                    Sesión iniciada correctamente.
                </div>

                <p class="text-muted">
                    Esta pantalla después se puede completar con el sidebar, menú Usuarios,
                    formulario de captura y modal de edad.
                </p>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="./js/utileria.js"></script>
    <script src="./js/login.js"></script>
</body>
</html>
