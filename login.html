<!DOCTYPE html> <!-- Indica que el documento usa HTML5 -->

<html lang="es"> <!-- Inicia la página y dice que el idioma es español -->

<head> <!-- Aquí van configuraciones de la página -->

    <meta charset="UTF-8"> <!-- Permite usar acentos, ñ y caracteres especiales -->

    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Hace que se adapte a celular y computadora -->

    <title>Login del Sistema</title> <!-- Título que aparece en la pestaña del navegador -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"> <!-- Conecta Bootstrap para usar estilos ya hechos -->

    <link rel="stylesheet" href="./css/login.css"> <!-- Conecta nuestro archivo CSS personalizado -->

</head> <!-- Cierra la parte de configuración -->

<body class="login-body"> <!-- Inicia lo visible de la página y aplica el fondo del login -->

    <div class="container"> <!-- Contenedor principal de Bootstrap -->

        <div class="row justify-content-center align-items-center min-vh-100"> <!-- Centra el login horizontal y verticalmente -->

            <div class="col-md-5 col-lg-4"> <!-- Define el tamaño del formulario en la pantalla -->

                <div class="card shadow login-card"> <!-- Crea una tarjeta con sombra para el login -->

                    <div class="card-body p-4"> <!-- Cuerpo de la tarjeta con espacio interno -->

                        <h2 class="text-center mb-3">Iniciar Sesión</h2> <!-- Título del formulario centrado -->

                        <p class="text-center text-muted"> <!-- Texto pequeño centrado y gris -->
                            Acceso simulado al sistema <!-- Explica que no usa base de datos real -->
                        </p> <!-- Cierra el texto descriptivo -->

                        <form id="formLogin"> <!-- Formulario del login controlado con JavaScript -->

                            <div class="mb-3"> <!-- Grupo del campo correo -->

                                <label for="correo" class="form-label">Correo electrónico</label> <!-- Etiqueta del correo -->

                                <input type="email" class="form-control" id="correo" placeholder="ejemplo@correo.com"> <!-- Campo donde se escribe el correo -->

                            </div> <!-- Cierra el grupo del correo -->

                            <div class="mb-3"> <!-- Grupo del campo contraseña -->

                                <label for="password" class="form-label">Contraseña</label> <!-- Etiqueta de la contraseña -->

                                <input type="password" class="form-control" id="password" placeholder="Ejemplo: Jared123@"> <!-- Campo donde se escribe la contraseña -->

                            </div> <!-- Cierra el grupo de contraseña -->

                            <div id="mensajeError" class="alert alert-danger d-none"> <!-- Mensaje de error, inicia oculto con d-none -->

                                Ingresa un correo válido y una contraseña segura. <!-- Texto que aparece si los datos están mal -->

                            </div> <!-- Cierra el mensaje de error -->

                            <button type="submit" class="btn btn-primary w-100"> <!-- Botón para enviar el formulario -->

                                Entrar al sistema <!-- Texto del botón -->

                            </button> <!-- Cierra el botón -->

                        </form> <!-- Cierra el formulario -->

                        <p class="text-center mt-3 text-muted small"> <!-- Texto pequeño de ayuda para probar -->

                            Prueba con: jared@gmail.com / Jared123@ <!-- Datos de ejemplo para entrar -->

                        </p> <!-- Cierra el texto de prueba -->

                    </div> <!-- Cierra el cuerpo de la tarjeta -->

                </div> <!-- Cierra la tarjeta -->

            </div> <!-- Cierra la columna -->

        </div> <!-- Cierra la fila -->

    </div> <!-- Cierra el contenedor principal -->

    <script src="./js/utileria.js"></script> <!-- Conecta la librería de validaciones -->

    <script src="./js/login.js"></script> <!-- Conecta el JavaScript del login -->

</body> <!-- Cierra el cuerpo visible -->

</html> <!-- Cierra el documento HTML -->
