<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login del Sistema</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/login.css">
</head>

<body class="login-body">

    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-5 col-lg-4">

                <div class="card shadow login-card">
                    <div class="card-body p-4">

                        <h2 class="text-center mb-3">Iniciar Sesión</h2>
                        <p class="text-center text-muted">
                            Acceso simulado al sistema
                        </p>

                        <form id="formLogin">

                            <div class="mb-3">
                                <label for="correo" class="form-label">Correo electrónico</label>
                                <input type="email" class="form-control" id="correo" placeholder="ejemplo@correo.com">
                            </div>

                            <div class="mb-3">
                                <label for="password" class="form-label">Contraseña</label>
                                <input type="password" class="form-control" id="password" placeholder="Ejemplo: Jared123@">
                            </div>

                            <div id="mensajeError" class="alert alert-danger d-none">
                                Ingresa un correo válido y una contraseña segura.
                            </div>

                            <button type="submit" class="btn btn-primary w-100">
                                Entrar al sistema
                            </button>

                        </form>

                        <p class="text-center mt-3 text-muted small">
                            Prueba con: jared@gmail.com / Jared123@
                        </p>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="./js/utileria.js"></script>
    <script src="./js/login.js"></script>
</body>
</html>
