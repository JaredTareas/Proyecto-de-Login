<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/login.css">
</head>

<body class="system-body">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">
        <a class="navbar-brand" href="#">Sistema Web</a>

        <div class="ms-auto dropdown">
            <button class="btn btn-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown">
                <span id="nombreUsuario">Usuario</span>
            </button>

            <ul class="dropdown-menu dropdown-menu-end">
                <li>
                    <button class="dropdown-item" id="btnSalir">
                        Salir del sistema
                    </button>
                </li>
            </ul>
        </div>
    </nav>

    <main class="container mt-5">
        <div class="card shadow">
            <div class="card-body">
                <h1>Bienvenido al sistema</h1>
                <p>
                    Si estás viendo esta pantalla, significa que el login funcionó correctamente.
                </p>

                <div class="alert alert-success">
                    Sesión iniciada correctamente.
                </div>

                <p class="text-muted">
                    Esta pantalla después se puede completar con el sidebar, menú Usuarios,
                    formulario de captura y modal de edad.
                </p>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="./js/utileria.js"></script>
    <script src="./js/login.js"></script>
</body>
</html>
